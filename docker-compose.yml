version: "3.9"

services:

  # ── Neo4j ────────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5
    container_name: virasat-neo4j
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/virasatpass
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_pagecache_size: 512M
      NEO4J_dbms_memory_heap_max__size: 512M
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "virasatpass", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Backend (FastAPI) ─────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: virasat-backend
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI:  bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASS: virasatpass
    volumes:
      - ./data:/app/data
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  # ── Frontend (Vite dev / Nginx prod) ─────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: virasat-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
